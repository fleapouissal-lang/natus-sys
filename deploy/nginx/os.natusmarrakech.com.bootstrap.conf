# Natus — os.natusmarrakech.com (bootstrap HTTP, sans SSL)
# Utiliser AVANT certbot, puis remplacer par os.natusmarrakech.com.conf
#
#   sudo cp deploy/nginx/os.natusmarrakech.com.bootstrap.conf \
#     /etc/nginx/sites-available/os.natusmarrakech.com
#   sudo ln -sf /etc/nginx/sites-available/os.natusmarrakech.com /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d os.natusmarrakech.com

server {
    listen 80;
    listen [::]:80;
    server_name os.natusmarrakech.com;

    client_max_body_size 20M;

    access_log /var/log/nginx/os.natusmarrakech.com.access.log;
    error_log /var/log/nginx/os.natusmarrakech.com.error.log;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
