# Natus — os.natusmarrakech.com
# App Next.js via PM2 sur le port 3002 (127.0.0.1:3002)
#
# Prérequis DNS :
#   Enregistrement A  os.natusmarrakech.com  →  161.97.134.231
#
# Installation sur le VPS :
#   sudo apt install -y nginx certbot python3-certbot-nginx
#   sudo mkdir -p /var/www/certbot
#
#   # 1) Avant SSL (proxy HTTP direct — nginx -t OK sans certificat) :
#   sudo cp deploy/nginx/os.natusmarrakech.com.bootstrap.conf \
#     /etc/nginx/sites-available/os.natusmarrakech.com
#   sudo ln -sf /etc/nginx/sites-available/os.natusmarrakech.com /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
#   # 2) Certificat Let's Encrypt :
#   sudo certbot --nginx -d os.natusmarrakech.com
#
#   # 3) Config production HTTPS (remplace le bootstrap) :
#   sudo cp deploy/nginx/os.natusmarrakech.com.conf \
#     /etc/nginx/sites-available/os.natusmarrakech.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# .env.local sur le VPS :
#   NEXT_PUBLIC_APP_URL=https://os.natusmarrakech.com
# Puis : bash deploy/deploy.sh
#
# Supabase → Authentication → URL Configuration :
#   Site URL : https://os.natusmarrakech.com
#   Redirect URLs : https://os.natusmarrakech.com/**

# HTTP → HTTPS (+ challenge Let's Encrypt)
server {
    listen 80;
    listen [::]:80;
    server_name os.natusmarrakech.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS → Next.js (PM2, port 3002)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name os.natusmarrakech.com;

    ssl_certificate /etc/letsencrypt/live/os.natusmarrakech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/os.natusmarrakech.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    access_log /var/log/nginx/os.natusmarrakech.com.access.log;
    error_log /var/log/nginx/os.natusmarrakech.com.error.log;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
