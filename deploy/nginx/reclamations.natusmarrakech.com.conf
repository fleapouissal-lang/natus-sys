# Natus — reclamations.natusmarrakech.com
# Sous-domaine public dédié au formulaire de réclamation (pas de PWA).
# Proxy vers la MÊME application Next.js (PM2, port 3002). Le routage par host
# est géré côté Next.js (middleware) : sur ce sous-domaine, seule la page
# /reclamation (et son API) est servie, et aucune PWA n'est activée.
#
# Prérequis DNS :
#   Enregistrement A  reclamations.natusmarrakech.com  →  161.97.134.231
#
# Installation sur le VPS :
#   # 1) Avant SSL (proxy HTTP direct) :
#   sudo cp deploy/nginx/reclamations.natusmarrakech.com.bootstrap.conf \
#     /etc/nginx/sites-available/reclamations.natusmarrakech.com
#   sudo ln -sf /etc/nginx/sites-available/reclamations.natusmarrakech.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
#   # 2) Certificat Let's Encrypt :
#   sudo certbot --nginx -d reclamations.natusmarrakech.com
#
#   # 3) Config production HTTPS (remplace le bootstrap) :
#   sudo cp deploy/nginx/reclamations.natusmarrakech.com.conf \
#     /etc/nginx/sites-available/reclamations.natusmarrakech.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# Aucune modification de .env.local n'est nécessaire : c'est la même app.

# HTTP → HTTPS (+ challenge Let's Encrypt)
server {
    listen 80;
    listen [::]:80;
    server_name reclamations.natusmarrakech.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS → Next.js (PM2, port 3002)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name reclamations.natusmarrakech.com;

    ssl_certificate /etc/letsencrypt/live/reclamations.natusmarrakech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reclamations.natusmarrakech.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    access_log /var/log/nginx/reclamations.natusmarrakech.com.access.log;
    error_log /var/log/nginx/reclamations.natusmarrakech.com.error.log;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
