# Natus — natus.fusionleap.net
# App Next.js via PM2 sur le port 3002 (127.0.0.1:3002)
#
# Installation sur le VPS :
#   sudo apt install -y nginx certbot python3-certbot-nginx
#   sudo mkdir -p /var/www/certbot
#   sudo cp deploy/nginx/natus.fusionleap.net.conf /etc/nginx/sites-available/natus.fusionleap.net
#   sudo ln -sf /etc/nginx/sites-available/natus.fusionleap.net /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d natus.fusionleap.net
#
# .env.local sur le VPS :
#   NEXT_PUBLIC_APP_URL=https://natus.fusionleap.net
# Puis : npm run build && pm2 restart natus
#
# Supabase → Authentication → URL Configuration :
#   Site URL : https://natus.fusionleap.net
#   Redirect URLs : https://natus.fusionleap.net/**

# HTTP → HTTPS (+ challenge Let's Encrypt)
server {
    listen 80;
    listen [::]:80;
    server_name natus.fusionleap.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS → Next.js (PM2, port 3002)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name natus.fusionleap.net;

    # Certificats Let's Encrypt (créés par certbot)
    ssl_certificate /etc/letsencrypt/live/natus.fusionleap.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/natus.fusionleap.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Logs (optionnel)
    access_log /var/log/nginx/natus.fusionleap.net.access.log;
    error_log /var/log/nginx/natus.fusionleap.net.error.log;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSockets (Next.js / hot reload si besoin)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
